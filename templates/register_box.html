
{% if success %}
<div id="register-success" data-success="true"></div>
{% endif %}

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mt-2">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="auth-card p-4">

    <h3 class="text-center mb-4 fw-bold">Create Account</h3>

    <form id="ownerRegisterForm" method="POST" action="{% url 'register' %}?popup=1">
        {% csrf_token %}

        <input type="text" name="username"
               class="form-control mb-3 auth-input"
               placeholder="Username" required>

        <input type="email" name="email"
               class="form-control mb-3 auth-input"
               placeholder="Email Address" required>

        <input type="password" name="password"
               class="form-control mb-3 auth-input"
               placeholder="Password" required>

        <input type="text" name="phone"
               class="form-control mb-3 auth-input"
               placeholder="Phone Number" required>

        <textarea name="address"
                  class="form-control mb-4 auth-input"
                  placeholder="Address"
                  rows="3" required></textarea>

        <button type="submit" class="btn btn-gold w-100">
            Register
        </button>
    </form>

    <p class="text-center mt-3 small">
        Already have an account?
        <a href="{% url 'login' %}" class="auth-link">Login</a>
    </p>

</div>
