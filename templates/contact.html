{% extends 'base.html' %}
{% block content %}

<!-- HERO -->
<section class="contact-hero text-white text-center d-flex align-items-center">
    <div class="container">
        <h1 class="fw-bold display-5">Contact EstatePro</h1>
        <p class="lead mt-3">We would love to hear from you</p>
    </div>
</section>


<!-- CONTACT SECTION -->
<section class="contact-section py-5">
    <div class="container">

        <div class="row g-4">

            <!-- Contact Form -->
            <div class="col-lg-7">
                <div class="contact-card p-4 p-md-5">

                    <h4 class="fw-bold mb-4">Send Us a Message</h4>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <input type="text"
                                       name="name"
                                       class="form-control contact-input"
                                       placeholder="Your Name"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="email"
                                       name="email"
                                       class="form-control contact-input"
                                       placeholder="Your Email"
                                       required>
                            </div>
                        </div>

                        <input type="text"
                               name="phone"
                               class="form-control contact-input mb-3"
                               placeholder="Phone Number">

                        <input type="text"
                               name="subject"
                               class="form-control contact-input mb-3"
                               placeholder="Subject"
                               required>

                        <textarea name="message"
                                  class="form-control contact-input mb-4"
                                  rows="4"
                                  placeholder="Your Message"
                                  required></textarea>

                        <button type="submit"
                                class="btn btn-gold w-100">
                            Send Message
                        </button>

                    </form>

                </div>
            </div>


            <!-- Contact Info -->
            <div class="col-lg-5">

                <div class="contact-info-card p-4 mb-4">
                    <h5 class="fw-bold mb-3">Our Office</h5>
                    <p>📍 Kochi, Kerala</p>
                    <p>📞 +91 98765 43210</p>
                    <p>✉ info@estatepro.com</p>
                </div>

                <!-- Map -->
                <div class="ratio ratio-4x3 rounded overflow-hidden shadow">
                    <iframe
                        src="https://www.google.com/maps?q=Kochi,Kerala&output=embed"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy">
                    </iframe>
                </div>

            </div>

        </div>

    </div>
</section>

{% endblock %}
